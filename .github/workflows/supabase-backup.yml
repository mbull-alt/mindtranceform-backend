name: Supabase Daily Backup

on:
  schedule:
    # Runs at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  backup:
    name: Dump & upload Supabase DB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      # Fix: use the official action instead of a broken curl|tar command.
      # The prior manual install used --strip-components=1 which strips the
      # filename itself (binary lives at archive root, no subdirectory wrapper),
      # causing tar to produce no output and exit non-zero every run.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          [ -z "${PROJECT_REF}" ] && echo "ERROR: SUPABASE_PROJECT_REF secret is not set" && exit 1
          [ -z "${SUPABASE_ACCESS_TOKEN}" ] && echo "ERROR: SUPABASE_ACCESS_TOKEN secret is not set" && exit 1
          # supabase link writes both .temp/project-ref and .temp/pooler-url.
          # The pooler URL is IPv4-only; without it the CLI defaults to the direct
          # host which is IPv6 and unreachable on GitHub Actions runners.
          # -p "" skips the interactive password prompt; dump uses a temp login role.
          supabase link --project-ref "${PROJECT_REF}" -p "" --yes

      - name: Dump database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILENAME="backup-${TIMESTAMP}.sql.gz"
          echo "FILENAME=${FILENAME}" >> "$GITHUB_ENV"

          # --linked (default) + SUPABASE_ACCESS_TOKEN: the CLI creates a temporary
          # login role via the Management API — no raw DB password required.
          supabase db dump --linked --yes \
            | gzip > "${FILENAME}"

          # Sanity-check: a real dump is never this small.
          SIZE_BYTES=$(wc -c < "${FILENAME}")
          if [ "${SIZE_BYTES}" -lt 500 ]; then
            echo "ERROR: dump is suspiciously small (${SIZE_BYTES} bytes) — likely a connection or auth failure"
            exit 1
          fi

          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "Backup size: ${SIZE} (${SIZE_BYTES} bytes)"
          echo "BACKUP_SIZE=${SIZE}" >> "$GITHUB_ENV"

      - name: Upload backup as artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 90

      # Success heartbeat: comments in a persistent "Backup health tracker" issue
      # so silence never reads as success. Also closes any open failure issues.
      - name: Success heartbeat
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            for (const [name, color] of [['backup-health', '0e8a16'], ['backup-failure', 'd93f0b']]) {
              try { await github.rest.issues.createLabel({ owner, repo, name, color }); } catch(e) {}
            }

            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'backup-health', per_page: 1
            });

            const body = `✅ **Backup succeeded** — \`${{ env.FILENAME }}\` (${{ env.BACKUP_SIZE }})\n[Run ${context.runId}](${runUrl})`;

            if (open.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: 'Backup health tracker', body, labels: ['backup-health'] });
            }

            const { data: failures } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'backup-failure', per_page: 10
            });
            for (const i of failures) {
              await github.rest.issues.update({ owner, repo, issue_number: i.number, state: 'closed' });
            }

      # Failure alert: opens a GitHub Issue on first failure; adds a comment on
      # subsequent failures so the issue thread is the audit trail.
      - name: Failure alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            try { await github.rest.issues.createLabel({ owner, repo, name: 'backup-failure', color: 'd93f0b' }); } catch(e) {}

            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'backup-failure', per_page: 1
            });

            const body = `Backup failed — ${new Date().toISOString()}\n[View run](${runUrl})`;

            if (open.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body });
            } else {
              await github.rest.issues.create({
                owner, repo, title: '🚨 Supabase daily backup failing', body, labels: ['backup-failure']
              });
            }
